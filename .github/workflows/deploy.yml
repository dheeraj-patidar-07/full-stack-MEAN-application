name: MEAN Stack CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3


    # DockerHub Login
    - name: Login to DockerHub
      run: |
        docker login -u ${{ secrets.DOCKER_USERNAME }} \
        -p ${{ secrets.DOCKER_PASSWORD }}


    # Build Backend Image
    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend ./backend


    # Build Frontend Image
    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend ./frontend


    # Push Backend
    - name: Push Backend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend


    # Push Frontend
    - name: Push Frontend
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend


    # Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          docker stop backend frontend mongodb || true
          docker rm backend frontend mongodb || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/mean-backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/mean-frontend

          docker run -d \
          --name mongodb \
          -p 27017:27017 \
          mongo

          sleep 10

          docker run -d \
          --name backend \
          -p 3000:8080 \
          --link mongodb:mongodb \
          ${{ secrets.DOCKER_USERNAME }}/mean-backend

          docker run -d \
          --name frontend \
          -p 80:80 \
          ${{ secrets.DOCKER_USERNAME }}/mean-frontend
