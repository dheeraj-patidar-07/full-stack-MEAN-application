name: MEAN Docker CI/CD

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3


    - name: Login DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    - name: Build Backend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-backend ./backend


    - name: Build Frontend Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/mean-frontend ./frontend


    - name: Push Backend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-backend


    - name: Push Frontend Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/mean-frontend


    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |

          sudo apt update
          sudo apt install docker.io -y

          sudo systemctl start docker
          sudo usermod -aG docker ubuntu

          docker stop backend || true
          docker stop frontend || true

          docker rm backend || true
          docker rm frontend || true

          docker pull ${{ secrets.DOCKER_USERNAME }}/mean-backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/mean-frontend

          docker run -d -p 3000:3000 --name backend ${{ secrets.DOCKER_USERNAME }}/mean-backend

          docker run -d -p 80:80 --name frontend ${{ secrets.DOCKER_USERNAME }}/mean-frontend
